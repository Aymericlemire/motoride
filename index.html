<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B00" />
    <title>MotoTrack</title>
    <link rel="manifest" href="manifest.json?v=20260409-1" />
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.svg" />
    <link rel="apple-touch-startup-image" href="assets/icons/splash-mobile.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="assets/css/design-system.css?v=20260409-1" />
    <link rel="stylesheet" href="assets/css/app.css?v=20260409-1" />
    <link rel="stylesheet" href="assets/css/map.css?v=20260409-1" />
    <link rel="stylesheet" href="assets/css/social.css?v=20260409-1" />
    <link rel="stylesheet" href="assets/css/stats.css?v=20260409-1" />
    <link rel="stylesheet" href="assets/css/auth.css?v=20260409-1" />
  </head>
  <body>
    <main id="appMain" class="app">
      <section id="tab-map" class="tab-screen active">
        <header class="header">
          <button class="btn-back">←</button>
          <div class="gps-badge">
            <span>🏍️</span>
            <div>
              <div class="gps-badge-title">GPS Connected</div>
              <div class="gps-badge-sub">Tracking active</div>
            </div>
            <span class="gps-dot"></span>
          </div>
          <button class="btn-notif">🔔</button>
        </header>

        <div id="mapContainer" class="map-container">
          <div id="map"></div>
          <div id="weatherWidget" class="glass-card weather-widget hidden"></div>
          <div id="gpsLivePanel" class="glass-card gps-live-panel hidden">GPS: en attente...</div>
          <button id="layerToggleBtn" class="hidden">Layer</button>
          <button id="locatePilotBtn" class="hidden">Me localiser</button>

          <article class="card-current-ride glass-card">
            <h3>Current Ride</h3>
            <div class="ride-stat">
              <span class="ride-stat-label">Distance</span>
              <span class="ride-stat-value">125 km</span>
            </div>
            <div class="ride-stat">
              <span class="ride-stat-label">Duration</span>
              <span class="ride-stat-value ride-timer">02:14:36</span>
            </div>
          </article>

          <article class="card-top-speed glass-card">
            <h4>Top Speed</h4>
            <div class="speed-value">187</div>
            <div class="speed-unit">km/h</div>
          </article>
        </div>

        <section class="profile-section">
          <div class="profile-row">
            <div class="profile-info">
              <img class="profile-avatar" src="https://i.pravatar.cc/100?img=8" alt="Alex Martin" />
              <div>
                <div class="profile-name">Alex Martin</div>
                <div class="profile-title">Pro Rider</div>
              </div>
            </div>
            <button class="btn-more">⋯</button>
          </div>

          <div class="stats-grid">
            <div class="stat-row">
              <span class="stat-label">Rides</span>
              <div class="stat-values">
                <span class="stat-value">248</span>
                <span class="stat-value">46 km</span>
              </div>
            </div>
            <div class="stat-row">
              <span class="stat-label">Total KM</span>
              <div class="stat-values">
                <span class="stat-value">18,450</span>
                <span class="stat-value">92 km/h</span>
              </div>
            </div>
          </div>
        </section>
      </section>

      <section id="tab-circuits" class="tab-screen">
        <div id="circuitsContainer" class="section-padding"></div>
      </section>

      <section id="tab-social" class="tab-screen">
        <div id="socialContainer" class="section-padding"></div>
      </section>

      <section id="tab-stats" class="tab-screen">
        <div id="statsContainer" class="section-padding"></div>
      </section>

      <section id="tab-profile" class="tab-screen">
        <div id="profileContainer" class="section-padding"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-tab="map" class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
      <button data-tab="circuits" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Map</span></button>
      <button data-tab="stats" class="nav-item"><span class="nav-icon">🎯</span><span class="nav-label">Stats</span></button>
      <button data-tab="social" class="nav-item"><span class="nav-icon">🏍️</span><span class="nav-label">Riders</span></button>
      <button data-tab="profile" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-label">Settings</span></button>
    </nav>

    <div id="toastContainer" class="toast-container"></div>
    <div id="globalLoader" class="global-loader hidden">Chargement...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="assets/js/app.js?v=20260409-1"></script>
  </body>
</html>
